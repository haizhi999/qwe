View" class="view view-hidden"><div class="app-header"><span class="app-header-title">我的</span> <button class="header-btn" id="btnBackFromProfile" title="返回"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div id="profileContent"><div class="profile-card"><div class="profile-avatar-wrap" id="avatarWrap"><div class="profile-avatar" id="profileAvatar"><img id="profileAvatarImg" src="https://api.dicebear.com/8.x/bottts-neutral/svg?seed=ZeroOne" alt="用户头像"></div><div class="profile-avatar-edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg></div></div><div class="profile-name" id="profileName">零壹用户</div><div class="rank-badge rank-bronze" id="rankBadge">🥉 青铜</div><div class="profile-xp-bar-wrap"><div class="profile-xp-bar" id="xpBar" style="width:0%"></div></div><div class="profile-xp-text" id="xpText">经验 0 / 100</div></div><div class="section-card"><div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> 每日任务</div><div id="taskList"></div></div><div class="section-card"><div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg> 数据管理</div><div style="display:flex;flex-direction:column;gap:8px"><button class="action-btn" id="btnExport"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" widt /span> <button id="btnCloseAuth" style="background:0 0;border:none;color:var(--text-muted);cursor:pointer;font-size:20px">&times;</button></div><input class="modal-input" type="email" id="authEmail" placeholder="邮箱地址"> <input class="modal-input" type="password" id="authPassword" placeholder="密码"> <button class="modal-btn" id="btnSignUp">注册</button> <button class="modal-btn" id="btnSignIn" style="margin-top:8px;background:rgba(255,255,255,.08)">登录</button><div id="authError" style="color:var(--danger);font-size:12px;margin-top:8px;display:none"></div></div></div><div class="image-preview-overlay hidden" id="imagePreview"><img id="imagePreviewImg" src="" alt="预览图片"></div><input type="file" id="fileInput" accept="image/*" style="display:none"> <input type="file" id="avatarInput" accept="image/*" style="display:none"><script>(function() {
  'use strict';

  // ============ CONSTANTS ============
  // 使用 DiceBear 生成的稳定 AI 头像，替代豆包 CDN
  const AI_AVATAR = 'https://api.dicebear.com/8.x/bottts-neutral/svg?seed=ZeroOneAI';
  const API_URL = 'https://text.pollinations.ai/openai';
  const SUPABASE_URL = 'https://fosbvnzdcebutixaapdg.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_WSBtdbeggyyxMGNUoPgqiQ_AFZ40hVX';

  const RANKS = [
    { name: '青铜', icon: '🥉', cls: 'rank-bronze', minXp: 0 },
    { name: '白银', icon: '🥈', cls: 'rank-silver', minXp: 100 },
    { name: '黄金', icon: '🥇', cls: 'rank-gold', minXp: 300 },
    { name: '铂金', icon: '💎', cls: 'rank-platinum', minXp: 600 },
    { name: '钻石', icon: '👑', cls: 'rank-diamond', minXp: 1000 },
    { name: '王者', icon: '🏆', cls: 'rank-king', minXp: 2000 }
  ];

  const DEFAULT_TASKS = [
    { id: 'send5', name: '发送 5 条消息', desc: '今日已发送 {count}/5 条', xp: 20, target: 5, key: 'msgCount' },
    { id: 'dailyLogin', name: '每日登录', desc: '今日已登录', xp: 10, target: 1, key: 'loginToday' },
    { id: 'chat3', name: '完成 3 轮对话', desc: '今日已完成 {count}/3 轮', xp: 30, target: 3, key: 'roundCount' }
  ];

  // ============ STATE ============
  let state = loadState();
  let supabase = null;
  let currentUser = null;

  function defaultState() {
    return {
      messages: [],
      xp: 0,
      avatar: null,
      nickname: '零壹用户',
      tasks: {
        msgCount: 0,
        loginToday: 0,
        roundCount: 0,
        claimed: {},
        date: new Date().toDateString()
      },
      lastRoundAi: false
    };
  }

  function loadState() {
    try {
      const raw = localStorage.getItem('zeroone_state');
      if (raw) {
        const s = JSON.parse(raw);
        const def = defaultState();
        for (const k of Object.keys(def)) {
          if (!(k in s)) s[k] = def[k];
        }
        if (!s.tasks || typeof s.tasks !== 'object') s.tasks = def.tasks;
        if (!s.tasks.claimed) s.tasks.claimed = {};
        return s;
      }
    } catch (e) {}
    return defaultState();
  }

  function saveState() {
    try {
      localStorage.setItem('zeroone_state', JSON.stringify(state));
    } catch (e) {}
  }

  // ============ DOM REFS ============
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  const splashScreen = $('#splashScreen');
  const splashProgress = $('#splashProgress');
  const app = $('#app');
  const chatView = $('#chatView');
  const profileView = $('#profileView');
  const chatMessages = $('#chatMessages');
  const emptyState = $('#emptyState');
  const msgInput = $('#msgInput');
  const btnSend = $('#btnSend');
  const btnAttach = $('#btnAttach');
  const fileInput = $('#fileInput');
  const avatarInput = $('#avatarInput');
  const authModal = $('#authModal');
  const imagePreview = $('#imagePreview');
  const imagePreviewImg = $('#imagePreviewImg');
  const snowCanvas = $('#snowCanvas');

  // ============ SUPABASE ============
  function initSupabase() {
    try {
      if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      }
    } catch (e) {
      console.warn('Supabase init failed:', e);
    }
  }

  async function checkSession() {
    if (!supabase) return;
    try {
      const { data } = await supabase.auth.getSession();
      if (data && data.session) {
        currentUser = data.session.user;
        updateAuthUI();
      }
    } catch (e) {}
  }

  function updateAuthUI() {
    const statusEl = $('#authStatus');
    const loginBtn = $('#btnLogin');
    if (currentUser) {
      if (statusEl) statusEl.textContent = '已登录: ' + (currentUser.email || currentUser.id);
      if (loginBtn) loginBtn.textContent = '退出登录';
    } else {
      if (statusEl) statusEl.textContent = '未登录';
      if (loginBtn) loginBtn.textContent = '登录 / 注册';
    }
  }

  // ============ SNOWFLAKES ============
  let snowflakes = [];
  let snowCtx = null;
  let snowW = 0, snowH = 0;

  function initSnow() {
    snowCtx = snowCanvas.getContext('2d');
    resizeSnow();
    for (let i = 0; i < 60; i++) {
      snowflakes.push({
        x: Math.random() * snowW,
        y: Math.random() * snowH,
        r: Math.random() * 2.5 + 1,
        speed: Math.random() * 0.6 + 0.2,
        wind: Math.random() * 0.3 - 0.15,
        opacity: Math.random() * 0.5 + 0.3
      });
    }
    animateSnow();
  }

  function resizeSnow() {
    snowW = window.innerWidth;
    snowH = window.innerHeight;
    snowCanvas.width = snowW;
    snowCanvas.height = snowH;
  }

  function animateSnow() {
    if (!snowCtx) return;
    snowCtx.clearRect(0, 0, snowW, snowH);
    for (const s of snowflakes) {
      s.y += s.speed;
      s.x += s.wind;
      if (s.y > snowH + 5) { s.y = -5; s.x = Math.random() * snowW; }
      if (s.x > snowW + 5) s.x = -5;
      if (s.x < -5) s.x = snowW + 5;
      snowCtx.beginPath();
      snowCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      snowCtx.fillStyle = 'rgba(180, 210, 255, ' + s.opacity + ')';
      snowCtx.fill();
    }
    requestAnimationFrame(animateSnow);
  }

  window.addEventListener('resize', resizeSnow);

  // ============ SPLASH SCREEN ============
  function runSplash() {
    let progress = 0;
    const steps = [
      { p: 20, delay: 300 },
      { p: 45, delay: 500 },
      { p: 70, delay: 400 },
      { p: 90, delay: 300 },
      { p: 100, delay: 200 }
    ];
    let i = 0;
    function next() {
      if (i >= steps.length) {
        setTimeout(() => {
          splashScreen.classList.add('hidden');
          app.style.display = 'flex';
          initSnow();
          renderMessages();
          renderTasks();
          updateProfileUI();
          checkSession();
        }, 300);
        return;
      }
      progress = steps[i].p;
      splashProgress.style.width = progress + '%';
      i++;
      setTimeout(next, steps[i - 1].delay);
    }
    next();
  }

  // ============ RANK SYSTEM ============
  function getRank(xp) {
    for (let i = RANKS.length - 1; i >= 0; i--) {
      if (xp >= RANKS[i].minXp) return RANKS[i];
    }
    return RANKS[0];
  }

  function getNextRank(xp) {
    for (let i = 0; i < RANKS.length; i++) {
      if (xp < RANKS[i].minXp) return RANKS[i];
    }
    return null;
  }

  function addXp(amount) {
    const oldRank = getRank(state.xp);
    state.xp += amount;
    const newRank = getRank(state.xp);
    saveState();
    updateProfileUI();
    if (newRank.name !== oldRank.name) {
      showToast('🎉 恭喜晋升 ' + newRank.icon + ' ' + newRank.name + '！');
    }
  }

  // ============ TASKS ============
  function checkTaskDate() {
    const today = new Date().toDateString();
    if (state.tasks.date !== today) {
      state.tasks.msgCount = 0;
      state.tasks.loginToday = 0;
      state.tasks.roundCount = 0;
      state.tasks.claimed = {};
      state.tasks.date = today;
      saveState();
    }
  }

  function completeTaskLogin() {
    checkTaskDate();
    if (state.tasks.loginToday < 1) {
      state.tasks.loginToday = 1;
      saveState();
      renderTasks();
    }
  }

  function incrementTask(key) {
    checkTaskDate();
    state.tasks[key] = (state.tasks[key] || 0) + 1;
    saveState();
    renderTasks();
  }

  function claimTask(taskId) {
    checkTaskDate();
    if (state.tasks.claimed[taskId]) return;
    const task = DEFAULT_TASKS.find(t => t.id === taskId);
    if (!task) return;
    const current = state.tasks[task.key] || 0;
    if (current >= task.target) {
      state.tasks.claimed[taskId] = true;
      saveState();
      addXp(task.xp);
      renderTasks();
      showToast('✅ 领取成功！+' + task.xp + ' 经验');
    }
  }

  function renderTasks() {
    checkTaskDate();
    const container = $('#taskList');
    if (!container) return;
    let html = '';
    for (const task of DEFAULT_TASKS) {
      const current = state.tasks[task.key] || 0;
      const done = current >= task.target;
      const claimed = state.tasks.claimed[task.id];
      const desc = task.desc.replace('{count}', current);
      let btnHtml = '';
      if (claimed) {
        btnHtml = '<button class="task-btn claimed">已领取</button>';
      } else if (done) {
        btnHtml = '<button class="task-btn claimable" data-task="' + task.id + '">领取</button>';
      } else {
        btnHtml = '<button class="task-btn claimed">进行中</button>';
      }
      html += '<div class="task-item">' +
        '<div class="task-info"><div class="task-name">' + task.name + '</div><div class="task-desc">' + desc + '</div></div>' +
        '<span class="task-xp">+' + task.xp + ' XP</span>' +
        btnHtml +
        '</div>';
    }
    container.innerHTML = html;
    container.querySelectorAll('.claimable').forEach(btn => {
      btn.addEventListener('click', function() {
        claimTask(this.dataset.task);
      });
    });
  }

  // ============ PROFILE UI ============
  function updateProfileUI() {
    const rank = getRank(state.xp);
    const nextRank = getNextRank(state.xp);
    const rankBadge = $('#rankBadge');
    const xpBar = $('#xpBar');
    const xpText = $('#xpText');
    const profileName = $('#profileName');
    const avatarImg = $('#profileAvatarImg');

    if (rankBadge) {
      rankBadge.className = 'rank-badge ' + rank.cls;
      rankBadge.textContent = rank.icon + ' ' + rank.name;
    }
    if (profileName) profileName.textContent = state.nickname;
    if (avatarImg) {
      avatarImg.src = state.avatar || AI_AVATAR;
    }

    if (xpBar && xpText && nextRank) {
      const currentMin = rank.minXp;
      const nextMin = nextRank.minXp;
      const pct = ((state.xp - currentMin) / (nextMin - currentMin)) * 100;
      xpBar.style.width = Math.min(100, Math.max(0, pct)) + '%';
      xpText.textContent = '经验 ' + state.xp + ' / ' + nextMin;
    } else if (xpBar && xpText) {
      xpBar.style.width = '100%';
      xpText.textContent = '经验 ' + state.xp + ' (已达最高段位)';
    }
  }

  // ============ CHAT ============
  function renderMessages() {
    if (state.messages.length === 0) {
      emptyState.style.display = 'flex';
    } else {
      emptyState.style.display = 'none';
    }
    let html = '';
    for (const msg of state.messages) {
      html += renderMessage(msg);
    }
    const existingEmpty = chatMessages.querySelector('.empty-state');
    const children = chatMessages.children;
    let toRemove = [];
    for (const child of children) {
      if (!child.classList.contains('empty-state')) {
        toRemove.push(child);
      }
    }
    toRemove.forEach(c => c.remove());
    if (existingEmpty) {
      existingEmpty.insertAdjacentHTML('afterend', html);
    } else {
      chatMessages.insertAdjacentHTML('beforeend', html);
    }
    scrollToBottom();
  }

  function renderMessage(msg) {
    const isUser = msg.role === 'user';
    const avatarSrc = isUser ? (state.avatar || AI_AVATAR) : AI_AVATAR;
    const time = msg.time ? new Date(msg.time).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '';
    let contentHtml = '';
    if (msg.image) {
      contentHtml += '<img class="msg-image" src="' + msg.image + '" alt="发送的图片" data-preview="' + msg.image + '" />';
    }
    contentHtml += '<div>' + escapeHtml(msg.content) + '</div>';
    if (time) {
      contentHtml += '<div class="msg-time">' + time + '</div>';
    }
    return '<div class="msg-row ' + (isUser ? 'user' : 'ai') + '">' +
      '<div class="msg-avatar"><img src="' + avatarSrc + '" alt="' + (isUser ? '用户' : 'AI') + '头像" /></div>' +
      '<div class="msg-bubble">' + contentHtml + '</div>' +
      '</div>';
  }

  function appendMessage(msg) {
    const existingEmpty = chatMessages.querySelector('.empty-state');
    if (existingEmpty) existingEmpty.style.display = 'none';
    const html = renderMessage(msg);
    chatMessages.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    bindImagePreviews();
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function sendMessage() {
    const content = msgInput.value.trim();
    if (!content) return;

    const userMsg = { role: 'user', content: content, time: Date.now() };
    state.messages.push(userMsg);
    state.lastRoundAi = false;
    msgInput.value = '';
    msgInput.style.height = 'auto';
    saveState();
    appendMessage(userMsg);

    incrementTask('msgCount');

    const typingEl = document.createElement('div');
    typingEl.className = 'msg-row ai';
    typingEl.innerHTML = '<div class="msg-avatar"><img src="' + AI_AVATAR + '" alt="AI头像" /></div>' +
      '<div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
    chatMessages.appendChild(typingEl);
    scrollToBottom();

    try {
      const messagesForApi = state.messages.map(m => ({ role: m.role, content: m.content }));
      const resp = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: [
            { role: 'system', content: '你是零壹，一个友好、专业的AI助手。用中文回复，回答简洁有帮助。' },
            ...messagesForApi
          ],
          model: 'openai',
          temperature: 0.7,
          max_tokens: 1000
        })
      });

      typingEl.remove();

      if (!resp.ok) throw new Error('API error: ' + resp.status);

      const data = await resp.json();
      let reply = '';
      if (data.choices && data.choices[0] && data.choices[0].message) {
        reply = data.choices[0].message.content;
      } else if (data.content) {
        reply = data.content;
      } else if (typeof data === 'string') {
        reply = data;
      } else {
        reply = '抱歉，我暂时无法回复，请稍后再试。';
      }

      const aiMsg = { role: 'assistant', content: reply, time: Date.now() };
      state.messages.push(aiMsg);
      state.lastRoundAi = true;
      saveState();
      appendMessage(aiMsg);

      if (state.lastRoundAi) {
        incrementTask('roundCount');
      }
    } catch (e) {
      typingEl.remove();
      const errMsg = { role: 'assistant', content: '⚠️ 网络连接失败，请检查网络后重试。', time: Date.now() };
      state.messages.push(errMsg);
      saveState();
      appendMessage(errMsg);
    }
  }

  function sendImage(imageDataUrl) {
    const userMsg = { role: 'user', content: '[图片]', image: imageDataUrl, time: Date.now() };
    state.messages.push(userMsg);
    state.lastRoundAi = false;
    saveState();
    appendMessage(userMsg);
    incrementTask('msgCount');

    const typingEl = document.createElement('div');
    typingEl.className = 'msg-row ai';
    typingEl.innerHTML = '<div class="msg-avatar"><img src="' + AI_AVATAR + '" alt="AI头像" /></div>' +
      '<div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
    chatMessages.appendChild(typingEl);
    scrollToBottom();

    fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [
          { role: 'system', content: '你是零壹，一个友好、专业的AI助手。用中文回复。用户发送了一张图片，请根据上下文友好回应。' },
          { role: 'user', content: '我发送了一张图片。请回应。' }
        ],
        model: 'openai',
        temperature: 0.7,
        max_tokens: 500
      })
    }).then(resp => resp.json()).then(data => {
      typingEl.remove();
      let reply = '';
      if (data.choices && data.choices[0] && data.choices[0].message) {
        reply = data.choices[0].message.content;
      } else {
        reply = '收到你的图片了！有什么想聊的吗？';
      }
      const aiMsg = { role: 'assistant', content: reply, time: Date.now() };
      state.messages.push(aiMsg);
      state.lastRoundAi = true;
      saveState();
      appendMessage(aiMsg);
      if (state.lastRoundAi) incrementTask('roundCount');
    }).catch(() => {
      typingEl.remove();
      const errMsg = { role: 'assistant', content: '收到你的图片了！', time: Date.now() };
      state.messages.push(errMsg);
      saveState();
      appendMessage(errMsg);
    });
  }

  function bindImagePreviews() {
    chatMessages.querySelectorAll('.msg-image').forEach(img => {
      if (img.dataset.bound) return;
      img.dataset.bound = '1';
      img.addEventListener('click', function() {
        imagePreviewImg.src = this.dataset.preview;
        imagePreview.classList.remove('hidden');
      });
    });
  }

  // ============ DATA EXPORT/IMPORT ============
  function exportData() {
    const data = JSON.stringify(state, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'zeroone_backup_' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('📦 数据已导出');
  }

  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (data.messages && typeof data.xp === 'number') {
            state = data;
            saveState();
            renderMessages();
            renderTasks();
            updateProfileUI();
            showToast('📥 数据已导入');
          } else {
            showToast('❌ 无效的数据文件');
          }
        } catch (err) {
          showToast('❌ 文件解析失败');
        }
      };
      reader.readAsText(file);
    });
    input.click();
  }

  function resetData() {
    if (confirm('确定要重置所有数据吗？此操作不可撤销！')) {
      state = defaultState();
      saveState();
      renderMessages();
      renderTasks();
      updateProfileUI();
      showToast('🔄 数据已重置');
    }
  }

  // ============ TOAST ============
  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }

  // ============ NAVIGATION ============
  function switchView(view) {
    const allNavItems = $$('.nav-item');
    if (view === 'chat') {
      chatView.style.display = 'flex';
      profileView.classList.add('view-hidden');
      allNavItems.forEach(item => {
        item.classList.toggle('active', item.dataset.view === 'chat');
      });
      scrollToBottom();
    } else {
      chatView.style.display = 'none';
      profileView.classList.remove('view-hidden');
      allNavItems.forEach(item => {
        item.classList.toggle('active', item.dataset.view === 'profile');
      });
      updateProfileUI();
      renderTasks();
      updateAuthUI();
    }
  }

  // ============ EVENT BINDINGS ============
  btnSend.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  msgInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

  btnAttach.addEventListener('click', function() {
    fileInput.click();
  });
  fileInput.addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      sendImage(e.target.result);
    };
    reader.readAsDataURL(file);
    this.value = '';
  });

  $('#btnClearChat').addEventListener('click', function() {
    if (confirm('确定要清空所有对话记录吗？')) {
      state.messages = [];
      saveState();
      renderMessages();
      showToast('🗑️ 对话已清空');
    }
  });

  $('#btnAuth').addEventListener('click', function() {
    authModal.classList.remove('hidden');
  });
  $('#btnCloseAuth').addEventListener('click', function() {
    authModal.classList.add('hidden');
  });
  authModal.addEventListener('click', function(e) {
    if (e.target === authModal) authModal.classList.add('hidden');
  });

  $('#btnSignUp').addEventListener('click', async function() {
    if (!supabase) { showToast('⚠️ 登录服务暂不可用'); return; }
    const email = $('#authEmail').value.trim();
    const password = $('#authPassword').value;
    if (!email || !password) { showToast('请填写邮箱和密码'); return; }
    const { data, error } = await supabase.auth.signUp({ email, password });
    if (error) {
      $('#authError').style.display = 'block';
      $('#authError').textContent = error.message;
    } else {
      $('#authError').style.display = 'none';
      showToast('📧 请检查邮箱完成验证');
      authModal.classList.add('hidden');
    }
  });

  $('#btnSignIn').addEventListener('click', async function() {
    if (!supabase) { showToast('⚠️ 登录服务暂不可用'); return; }
    const email = $('#authEmail').value.trim();
    const password = $('#authPassword').value;
    if (!email || !password) { showToast('请填写邮箱和密码'); return; }
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      $('#authError').style.display = 'block';
      $('#authError').textContent = error.message;
    } else {
      $('#authError').style.display = 'none';
      currentUser = data.user;
      updateAuthUI();
      showToast('✅ 登录成功');
      authModal.classList.add('hidden');
    }
  });

  $('#btnLogin').addEventListener('click', function() {
    if (currentUser && supabase) {
      supabase.auth.signOut().then(() => {
        currentUser = null;
        updateAuthUI();
        showToast('👋 已退出登录');
      });
    } else {
      authModal.classList.remove('hidden');
    }
  });

  $('#avatarWrap').addEventListener('click', function() {
    avatarInput.click();
  });
  avatarInput.addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      state.avatar = e.target.result;
      saveState();
      updateProfileUI();
      renderMessages();
      showToast('🖼️ 头像已更新');
    };
    reader.readAsDataURL(file);
    this.value = '';
  });

  imagePreview.addEventListener('click', function() {
    imagePreview.classList.add('hidden');
  });

  $$('.nav-item').forEach(item => {
    item.addEventListener('click', function() {
      switchView(this.dataset.view);
    });
  });
  $('#btnBackFromProfile').addEventListener('click', function() {
    switchView('chat');
  });

  $('#btnExport').addEventListener('click', exportData);
  $('#btnImport').addEventListener('click', importData);
  $('#btnReset').addEventListener('click', resetData);

  // ============ INIT ============
  initSupabase();
  completeTaskLogin();
  runSplash();
})();</script></body></html>
